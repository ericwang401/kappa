timezone = "America/New_York"
timeout_seconds = 90
prompt = "Reply exactly: OK"
log_file = "~/.local/state/kappa/kappa.log"
lock_file = "~/.local/state/kappa/kappa.lock"
path = "~/.local/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin"

[providers.claude]
enabled = true
check_url = "https://api.anthropic.com/"
# Logged after a successful warmup. `claude /usage` is a read-only status query
# (it does not consume the window) and prints the rolling session usage + reset,
# e.g. "Current session: 51% used · resets Jun 27, 11:39pm".
status_command = ["claude", "--safe-mode", "--no-session-persistence", "-p", "/usage"]
command = [
  "claude",
  "--safe-mode",
  "--model",
  "haiku",
  "--effort",
  "low",
  "--max-budget-usd",
  "0.01",
  "--tools",
  "",
  "--no-session-persistence",
  "-p",
]

[providers.opencode]
enabled = false
command = [
  "opencode",
  "run",
  "--pure",
]

[providers.codex]
enabled = true
check_url = "https://chatgpt.com/"
# Codex reasoning on the default model can run well past the global 90s cap; a
# killed run never lands a message, so the 5-hour window never starts.
timeout_seconds = 180
# Logged after a successful warmup. Codex only exposes its windows via the
# interactive /status; codex_usage.py runs the same app-server RPC headlessly and
# prints e.g. "5h: 2% used, resets ... | weekly: 1% used, resets ...". It reaches
# chatgpt.com, so it only runs when the warmup above already succeeded (i.e. once
# Codex connectivity works). Point the path at the deployed helper.
status_command = ["python3", "/opt/kappa/codex_usage.py"]
command = [
  "codex",
  "exec",
  "--config",
  "model_reasoning_effort=\"low\"",
  "--config",
  "model_verbosity=\"low\"",
  "--sandbox",
  "read-only",
  "--ephemeral",
  "--skip-git-repo-check",
]

# chatgpt.com (Codex's ChatGPT-login endpoint) is often blocked from datacenter
# IPs. If `kappa doctor` shows codex's check_url failing, route just this provider
# through a residential egress by uncommenting an env table below. Any of these
# work; kappa stays provider-agnostic and does not depend on a specific tool.
#
# Through an HTTP proxy on a residential box (also probed by `doctor`):
# [providers.codex.env]
# HTTPS_PROXY = "http://10.0.0.5:8080"
#
# Through a Tailscale exit node exposing a SOCKS proxy (run-only, not probed):
# [providers.codex.env]
# ALL_PROXY = "socks5://127.0.0.1:1055"
#
# Alternatively, wrap the command itself, e.g. command = ["proxychains4", "codex", ...].
